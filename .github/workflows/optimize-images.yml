name: Optimize images on: workflow_dispatch: {} push: branches: - enhance/pwa-and-images

jobs: optimize: runs-on: ubuntu-latest steps: - name: Checkout uses: actions/checkout@v4 with: persist-credentials: true fetch-depth: 0 - name: Install image tools run: | sudo apt-get update sudo apt-get install -y jpegoptim pngquant libjpeg-progs - name: Optimize images run: | set -e shopt -s globstar || true files=$(git ls-files "/*.jpg" "/.jpeg" "**/.JPG" "/*.JPEG" "/.png" || true) if [ -z "$files" ]; then echo "No image files found" exit 0 fi for f in $files; do if [[ $f == .png ]]; then echo "Optimizing PNG: $f" pngquant --quality=65-85 --skip-if-larger --ext .png --force "$f" || true else echo "Optimizing JPEG: $f" jpegoptim --max=85 --strip-all --all-progressive "$f" || true fi done - name: Show image sizes run: | du -sh $(git ls-files "**/.jpg" "**/.jpeg" "**/*.png" 2>/dev/null) | sort -h || true - name: Commit optimized images run: | git config user.name "github-actions[bot]" git config user.email "41898282+github-actions[bot]@users.noreply.github.com" git add -A if git diff --cached --quiet; then echo "No changes to commit" else git commit -m "chore(images): optimize images (jpegoptim/pngquant)" git push origin HEAD:enhance/pwa-and-images fi
