    <!-- Make images responsive and ensure they fit containers regardless of original size -->
    <style>
      /* Global rule for all images: scale down to container width, keep aspect ratio */
      img {
        max-width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
      }

      /* Helper class for images that should fill their container (cover) */
      .img-cover {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Helper class for fixed-aspect ratio containers using background-image */
      .responsive-bg {
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        width: 100%;
        height: auto;
      }

      /* Ensure root fills viewport so SPA can size content correctly */
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>

      </div>

    <script>
      // Register service worker for basic offline caching
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js').then(function(reg){
            console.log('ServiceWorker registered', reg.scope);
          }).catch(function(err){
            console.warn('ServiceWorker registration failed:', err);
          });
        });
      }

      // If the SPA injects images dynamically, ensure they get responsive classes
      // MutationObserver adds the 'img-cover' class to images inside #root that lack explicit sizing
      (function(){
        function enhanceImg(img){
          if (!img) return;
          // If the image has inline width/height that would break responsiveness, remove them
          try {
            img.removeAttribute('width');
            img.removeAttribute('height');
          } catch(e){}
          // Add a responsive helper class if none present
          if (!img.classList.contains('img-cover')) img.classList.add('img-cover');
        }

        var observer = new MutationObserver(function(mutations){
          mutations.forEach(function(m){
            m.addedNodes && m.addedNodes.forEach(function(node){
              if (node.nodeType !== 1) return;
              if (node.tagName === 'IMG') {
                enhanceImg(node);
              } else {
                // find images inside newly added subtree
                var imgs = node.querySelectorAll && node.querySelectorAll('img');
                imgs && imgs.forEach(enhanceImg);
              }
            });
          });
        });

        var root = document.getElementById('root');
        if (root) {
          // enhance any existing images
          root.querySelectorAll && root.querySelectorAll('img').forEach(enhanceImg);
          observer.observe(root, { childList: true, subtree: true });
        }
      })();
    </script>
