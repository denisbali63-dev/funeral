<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Pagina non trovata</title>
    <meta http-equiv="refresh" content="0; url=/" />
    <meta name="robots" content="noindex" />
    <style>
      body { font-family: Arial, Helvetica, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f7f7f7; color:#222 }
      .wrap { text-align:center }
      a { color:#0066cc }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Pagina non trovata</h1>
      <p>Verrai reindirizzato automaticamente alla home in pochi istanti. Oppure clicca <a href="/">qui</a>.</p>
    </div>
    <script>
      // Fallback: redirect via JS if meta refresh non funziona
      try {
        setTimeout(function(){ window.location.replace('/'); }, 100);
      } catch(e) {}
    </script>
  </body>
</html>
